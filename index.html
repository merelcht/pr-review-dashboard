<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PR Review Dashboard</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface-hover: #1c2129;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --green: #3fb950;
      --yellow: #d29922;
      --red: #f85149;
      --purple: #bc8cff;
      --orange: #db6d28;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    header h1 {
      font-size: 20px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    header h1 svg { fill: var(--text); }

    .header-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    button, select, input {
      font-family: inherit;
      font-size: 14px;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 12px;
      outline: none;
    }

    button:hover { background: var(--surface-hover); cursor: pointer; }
    button:focus, select:focus, input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(88,166,255,0.3); }

    .btn-primary {
      background: #238636;
      border-color: rgba(240,246,252,0.1);
      color: #fff;
    }
    .btn-primary:hover { background: #2ea043; }

    .setup-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .setup-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      max-width: 520px;
      width: 90%;
    }

    .setup-card h2 { margin-bottom: 8px; font-size: 20px; }
    .setup-card p { color: var(--text-muted); margin-bottom: 20px; font-size: 14px; line-height: 1.5; }

    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
    .form-group input, .form-group textarea {
      width: 100%;
      padding: 8px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
    }
    .form-group textarea { min-height: 80px; resize: vertical; }
    .form-group .hint { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

    .main-content { padding: 24px; max-width: 1400px; margin: 0 auto; }

    .stats-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      text-align: center;
    }

    .stat-card .stat-number { font-size: 28px; font-weight: 700; }
    .stat-card .stat-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }

    .filters-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filters-bar input[type="search"] {
      flex: 1;
      min-width: 200px;
      padding: 8px 12px;
      background: var(--bg);
    }

    .reviewer-summary {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 24px;
    }

    .reviewer-summary h3 { font-size: 14px; margin-bottom: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }

    .reviewer-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .reviewer-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px 4px 4px;
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .reviewer-chip:hover, .reviewer-chip.active { border-color: var(--accent); }
    .reviewer-chip.active { background: rgba(88,166,255,0.1); }

    .reviewer-chip img {
      width: 24px;
      height: 24px;
      border-radius: 50%;
    }

    .reviewer-chip .chip-count {
      background: var(--border);
      border-radius: 10px;
      padding: 0 6px;
      font-size: 11px;
      font-weight: 600;
      min-width: 20px;
      text-align: center;
    }

    .pr-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .pr-table th {
      text-align: left;
      padding: 12px 16px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }

    .pr-table th:hover { color: var(--text); }
    .pr-table th .sort-arrow { margin-left: 4px; font-size: 10px; }

    .pr-table td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      vertical-align: middle;
    }

    .pr-table tr:last-child td { border-bottom: none; }
    .pr-table tbody tr:hover { background: var(--surface-hover); }

    .pr-title-cell { max-width: 400px; }
    .pr-title-link {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    .pr-title-link:hover { text-decoration: underline; }

    .pr-repo {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .pr-number { color: var(--text-muted); font-weight: 400; }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }

    .status-needs-review { background: rgba(210,153,34,0.15); color: var(--yellow); }
    .status-in-review { background: rgba(88,166,255,0.15); color: var(--accent); }
    .status-approved { background: rgba(63,185,80,0.15); color: var(--green); }
    .status-changes-requested { background: rgba(248,81,73,0.15); color: var(--red); }
    .status-draft { background: rgba(139,148,158,0.15); color: var(--text-muted); }
    .status-merged { background: rgba(188,140,255,0.15); color: var(--purple); }

    .reviewer-avatars {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }

    .reviewer-avatar {
      position: relative;
      display: inline-block;
    }

    .reviewer-avatar img {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid var(--surface);
    }

    .reviewer-avatar .review-state-dot {
      position: absolute;
      bottom: -2px;
      right: -2px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 2px solid var(--surface);
    }

    .review-dot-pending { background: var(--yellow); }
    .review-dot-approved { background: var(--green); }
    .review-dot-changes { background: var(--red); }
    .review-dot-commented { background: var(--accent); }

    .author-cell {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .author-cell img {
      width: 24px;
      height: 24px;
      border-radius: 50%;
    }

    .time-ago { color: var(--text-muted); font-size: 13px; white-space: nowrap; }

    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .loading-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .tooltip {
      position: relative;
    }

    .tooltip::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: #1f2937;
      color: var(--text);
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s;
      z-index: 10;
    }

    .tooltip:hover::after { opacity: 1; }

    .settings-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
    }
    .settings-btn:hover { color: var(--text); }

    @media (max-width: 768px) {
      .pr-table { font-size: 13px; }
      .pr-table th, .pr-table td { padding: 8px 10px; }
      .hide-mobile { display: none; }
    }
  </style>
</head>
<body>
  <div id="setup-overlay" class="setup-overlay" style="display:none;">
    <div class="setup-card">
      <h2>Configure Dashboard</h2>
      <p>Enter a GitHub personal access token (with <code>repo</code> scope) and the repos you want to track.</p>
      <div class="form-group">
        <label for="token-input">GitHub Token</label>
        <input type="password" id="token-input" placeholder="ghp_xxxxxxxxxxxx">
        <div class="hint">Stored locally in your browser only. Never sent anywhere except GitHub's API.</div>
      </div>
      <div class="form-group">
        <label for="repos-input">Repositories (owner/repo, one per line)</label>
        <textarea id="repos-input" placeholder="kedro-org/kedro&#10;kedro-org/kedro-plugins&#10;kedro-org/kedro-viz"></textarea>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:20px;">
        <button id="setup-cancel" style="display:none;">Cancel</button>
        <button id="setup-save" class="btn-primary">Save & Load</button>
      </div>
    </div>
  </div>

  <header>
    <h1>
      <svg width="20" height="20" viewBox="0 0 16 16"><path d="M7.177 3.073L9.573.677A.25.25 0 0110 .854v4.792a.25.25 0 01-.427.177L7.177 3.427a.25.25 0 010-.354zM3.75 2.5a.75.75 0 100 1.5.75.75 0 000-1.5zm-2.25.75a2.25 2.25 0 113 2.122v5.256a2.251 2.251 0 11-1.5 0V5.372A2.25 2.25 0 011.5 3.25zM11 2.5h-1V4h1a1 1 0 011 1v5.628a2.251 2.251 0 101.5 0V5A2.5 2.5 0 0011 2.5zm1 10.25a.75.75 0 111.5 0 .75.75 0 01-1.5 0zM3.75 12a.75.75 0 100 1.5.75.75 0 000-1.5z"/></svg>
      PR Review Dashboard
    </h1>
    <div class="header-actions">
      <span id="last-updated" class="time-ago"></span>
      <button id="refresh-btn" onclick="fetchAllPRs()">Refresh</button>
      <button class="settings-btn" onclick="showSetup(true)" title="Settings">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0a8.2 8.2 0 01.701.031C9.444.095 9.99.645 10.16 1.29l.17.638c.196.742.792 1.25 1.477 1.392.443.092.89.226 1.325.4a1.64 1.64 0 001.97-.513l.408-.537a1.64 1.64 0 012.243-.2 8.25 8.25 0 01.548.467 1.64 1.64 0 01.2 2.243l-.408.537a1.64 1.64 0 00-.107 2.017c.253.559.454 1.142.601 1.748.09.372.506.86 1.152 1.027l.638.17c.646.17 1.196.716 1.26 1.46a8.3 8.3 0 010 1.402c-.064.744-.614 1.29-1.26 1.46l-.638.17c-.646.168-1.062.655-1.152 1.027a6.5 6.5 0 01-.6 1.748 1.64 1.64 0 00.106 2.017l.408.537a1.64 1.64 0 01-.2 2.243 8.2 8.2 0 01-.548.467 1.64 1.64 0 01-2.243-.2l-.408-.537a1.64 1.64 0 00-1.97-.513 6.5 6.5 0 01-1.325.4c-.685.143-1.28.65-1.477 1.392l-.17.638c-.17.646-.716 1.196-1.46 1.26a8.2 8.2 0 01-1.402 0c-.744-.064-1.29-.614-1.46-1.26l-.17-.638c-.196-.742-.792-1.25-1.477-1.392a6.5 6.5 0 01-1.325-.4 1.64 1.64 0 00-1.97.513l-.408.537a1.64 1.64 0 01-2.243.2 8.2 8.2 0 01-.548-.467 1.64 1.64 0 01-.2-2.243l.408-.537a1.64 1.64 0 00.107-2.017A6.5 6.5 0 011.928 10.7c-.09-.372-.506-.86-1.152-1.027l-.638-.17C-.508 9.333-1.058 8.787-1.122 8.043a8.2 8.2 0 010-1.402C-1.058 5.897-.508 5.35.138 5.18l.638-.17c.646-.168 1.062-.655 1.152-1.027.147-.606.348-1.189.601-1.748A1.64 1.64 0 002.422 .218l-.408-.537A1.64 1.64 0 014.257-.52a8.2 8.2 0 01.548.467 1.64 1.64 0 002.243.2" transform="scale(0.58) translate(5.5,5.5)"/></svg>
      </button>
    </div>
  </header>

  <div class="main-content">
    <div class="stats-bar" id="stats-bar"></div>

    <div class="reviewer-summary" id="reviewer-summary" style="display:none;">
      <h3>Review Load by Reviewer</h3>
      <div class="reviewer-chips" id="reviewer-chips"></div>
    </div>

    <div class="filters-bar">
      <input type="search" id="search-input" placeholder="Search PRs by title, author, or repo...">
      <select id="status-filter">
        <option value="all">All statuses</option>
        <option value="needs_review">Needs review</option>
        <option value="in_review">In review</option>
        <option value="approved">Approved</option>
        <option value="changes_requested">Changes requested</option>
        <option value="draft">Draft</option>
        <option value="merged">Merged</option>
      </select>
      <select id="repo-filter">
        <option value="all">All repos</option>
      </select>
      <select id="sort-select">
        <option value="updated_desc">Recently updated</option>
        <option value="updated_asc">Least recently updated</option>
        <option value="created_desc">Newest first</option>
        <option value="created_asc">Oldest first</option>
        <option value="reviewers_desc">Most reviewers</option>
      </select>
    </div>

    <div id="pr-list">
      <div class="empty-state">Configure your repos to get started.</div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'pr-dashboard-config';
    const CACHE_KEY = 'pr-dashboard-cache';
    let allPRs = [];
    let activeReviewerFilter = null;

    function getConfig() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || null; } catch { return null; }
    }

    function saveConfig(token, repos) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ token, repos }));
    }

    function showSetup(isEdit) {
      const overlay = document.getElementById('setup-overlay');
      const cancelBtn = document.getElementById('setup-cancel');
      overlay.style.display = 'flex';
      if (isEdit) {
        cancelBtn.style.display = 'inline-block';
        const config = getConfig();
        if (config) {
          document.getElementById('token-input').value = config.token;
          document.getElementById('repos-input').value = config.repos.join('\n');
        }
      }
    }

    document.getElementById('setup-cancel').addEventListener('click', () => {
      document.getElementById('setup-overlay').style.display = 'none';
    });

    document.getElementById('setup-save').addEventListener('click', () => {
      const token = document.getElementById('token-input').value.trim();
      const reposRaw = document.getElementById('repos-input').value.trim();
      if (!token || !reposRaw) return alert('Please fill in both fields.');
      const repos = reposRaw.split('\n').map(r => r.trim()).filter(Boolean);
      saveConfig(token, repos);
      document.getElementById('setup-overlay').style.display = 'none';
      populateRepoFilter(repos);
      fetchAllPRs();
    });

    function populateRepoFilter(repos) {
      const sel = document.getElementById('repo-filter');
      sel.innerHTML = '<option value="all">All repos</option>';
      repos.forEach(r => {
        const opt = document.createElement('option');
        opt.value = r;
        opt.textContent = r.split('/').pop();
        sel.appendChild(opt);
      });
    }

    async function ghFetch(url, token) {
      const res = await fetch(url, {
        headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' }
      });
      if (!res.ok) throw new Error(`GitHub API error: ${res.status} ${res.statusText}`);
      return res.json();
    }

    async function fetchPRsForRepo(repo, token) {
      const [openPRs, closedPRs] = await Promise.all([
        ghFetch(`https://api.github.com/repos/${repo}/pulls?state=open&per_page=100&sort=updated&direction=desc`, token),
        ghFetch(`https://api.github.com/repos/${repo}/pulls?state=closed&per_page=30&sort=updated&direction=desc`, token),
      ]);

      const allRepoPRs = [...openPRs, ...closedPRs.filter(pr => pr.merged_at)];
      const enriched = await Promise.all(allRepoPRs.map(async pr => {
        let reviews = [];
        try {
          reviews = await ghFetch(`https://api.github.com/repos/${repo}/pulls/${pr.number}/reviews`, token);
        } catch {}

        const reviewerMap = new Map();
        if (pr.requested_reviewers) {
          pr.requested_reviewers.forEach(r => {
            reviewerMap.set(r.login, { user: r, state: 'PENDING' });
          });
        }
        reviews.forEach(r => {
          if (r.user.login === pr.user.login) return;
          const existing = reviewerMap.get(r.user.login);
          if (!existing || r.submitted_at > (existing.submitted_at || '')) {
            reviewerMap.set(r.user.login, { user: r.user, state: r.state, submitted_at: r.submitted_at });
          }
        });

        let status;
        if (pr.draft) {
          status = 'draft';
        } else if (pr.merged_at) {
          status = 'merged';
        } else {
          const reviewStates = [...reviewerMap.values()].map(v => v.state);
          if (reviewStates.includes('CHANGES_REQUESTED')) status = 'changes_requested';
          else if (reviewStates.includes('APPROVED')) status = 'approved';
          else if (reviewStates.some(s => s === 'COMMENTED' || s === 'DISMISSED')) status = 'in_review';
          else if (reviewStates.length > 0 && reviewStates.every(s => s === 'PENDING')) status = 'needs_review';
          else if (reviewerMap.size === 0) status = 'needs_review';
          else status = 'needs_review';
        }

        return {
          id: pr.id,
          number: pr.number,
          title: pr.title,
          url: pr.html_url,
          repo,
          repoShort: repo.split('/').pop(),
          author: pr.user,
          draft: pr.draft,
          merged: !!pr.merged_at,
          status,
          reviewers: [...reviewerMap.values()],
          created_at: pr.created_at,
          updated_at: pr.updated_at,
          additions: pr.additions,
          deletions: pr.deletions,
          labels: pr.labels || [],
        };
      }));

      return enriched;
    }

    async function fetchAllPRs() {
      const config = getConfig();
      if (!config) return showSetup(false);

      document.getElementById('pr-list').innerHTML = '<div class="loading"><div class="loading-spinner"></div>Fetching PRs from ' + config.repos.length + ' repos...</div>';

      try {
        const results = await Promise.all(config.repos.map(repo => fetchPRsForRepo(repo, config.token)));
        allPRs = results.flat();
        localStorage.setItem(CACHE_KEY, JSON.stringify({ time: Date.now(), data: allPRs }));
        document.getElementById('last-updated').textContent = 'Updated just now';
        renderAll();
      } catch (err) {
        document.getElementById('pr-list').innerHTML = `<div class="empty-state">Error loading PRs: ${err.message}<br><br><button onclick="showSetup(true)">Check Settings</button></div>`;
      }
    }

    function renderAll() {
      renderStats();
      renderReviewerChips();
      renderTable();
    }

    function getFilteredPRs() {
      const search = document.getElementById('search-input').value.toLowerCase();
      const statusFilter = document.getElementById('status-filter').value;
      const repoFilter = document.getElementById('repo-filter').value;
      const sort = document.getElementById('sort-select').value;

      let prs = allPRs.filter(pr => {
        if (search && !pr.title.toLowerCase().includes(search) && !pr.author.login.toLowerCase().includes(search) && !pr.repo.toLowerCase().includes(search)) return false;
        if (statusFilter !== 'all' && pr.status !== statusFilter) return false;
        if (repoFilter !== 'all' && pr.repo !== repoFilter) return false;
        if (activeReviewerFilter && !pr.reviewers.some(r => r.user.login === activeReviewerFilter)) return false;
        return true;
      });

      prs.sort((a, b) => {
        switch (sort) {
          case 'updated_desc': return new Date(b.updated_at) - new Date(a.updated_at);
          case 'updated_asc': return new Date(a.updated_at) - new Date(b.updated_at);
          case 'created_desc': return new Date(b.created_at) - new Date(a.created_at);
          case 'created_asc': return new Date(a.created_at) - new Date(b.created_at);
          case 'reviewers_desc': return b.reviewers.length - a.reviewers.length;
          default: return 0;
        }
      });

      return prs;
    }

    function renderStats() {
      const stats = {
        total: allPRs.filter(pr => !pr.merged).length,
        needs_review: allPRs.filter(pr => pr.status === 'needs_review').length,
        in_review: allPRs.filter(pr => pr.status === 'in_review').length,
        approved: allPRs.filter(pr => pr.status === 'approved').length,
        changes_requested: allPRs.filter(pr => pr.status === 'changes_requested').length,
        draft: allPRs.filter(pr => pr.status === 'draft').length,
      };

      document.getElementById('stats-bar').innerHTML = `
        <div class="stat-card"><div class="stat-number">${stats.total}</div><div class="stat-label">Open PRs</div></div>
        <div class="stat-card"><div class="stat-number" style="color:var(--yellow)">${stats.needs_review}</div><div class="stat-label">Needs Review</div></div>
        <div class="stat-card"><div class="stat-number" style="color:var(--accent)">${stats.in_review}</div><div class="stat-label">In Review</div></div>
        <div class="stat-card"><div class="stat-number" style="color:var(--green)">${stats.approved}</div><div class="stat-label">Approved</div></div>
        <div class="stat-card"><div class="stat-number" style="color:var(--red)">${stats.changes_requested}</div><div class="stat-label">Changes Req.</div></div>
        <div class="stat-card"><div class="stat-number" style="color:var(--text-muted)">${stats.draft}</div><div class="stat-label">Draft</div></div>
      `;
    }

    function renderReviewerChips() {
      const reviewerCounts = new Map();
      allPRs.filter(pr => !pr.merged).forEach(pr => {
        pr.reviewers.forEach(r => {
          const entry = reviewerCounts.get(r.user.login) || { user: r.user, pending: 0, total: 0 };
          entry.total++;
          if (r.state === 'PENDING') entry.pending++;
          reviewerCounts.set(r.user.login, entry);
        });
      });

      if (reviewerCounts.size === 0) {
        document.getElementById('reviewer-summary').style.display = 'none';
        return;
      }

      document.getElementById('reviewer-summary').style.display = 'block';
      const sorted = [...reviewerCounts.entries()].sort((a, b) => b[1].total - a[1].total);

      document.getElementById('reviewer-chips').innerHTML = `
        <div class="reviewer-chip ${!activeReviewerFilter ? 'active' : ''}" onclick="setReviewerFilter(null)">
          All
        </div>
        ${sorted.map(([login, data]) => `
          <div class="reviewer-chip ${activeReviewerFilter === login ? 'active' : ''}" onclick="setReviewerFilter('${login}')">
            <img src="${data.user.avatar_url}&s=48" alt="${login}">
            ${login}
            <span class="chip-count" title="${data.pending} pending">${data.total}</span>
          </div>
        `).join('')}
      `;
    }

    function setReviewerFilter(login) {
      activeReviewerFilter = login;
      renderReviewerChips();
      renderTable();
    }

    function renderTable() {
      const prs = getFilteredPRs();

      if (prs.length === 0) {
        document.getElementById('pr-list').innerHTML = '<div class="empty-state">No PRs match your filters.</div>';
        return;
      }

      const statusLabels = {
        needs_review: '<span class="status-badge status-needs-review">Needs Review</span>',
        in_review: '<span class="status-badge status-in-review">In Review</span>',
        approved: '<span class="status-badge status-approved">Approved</span>',
        changes_requested: '<span class="status-badge status-changes-requested">Changes Requested</span>',
        draft: '<span class="status-badge status-draft">Draft</span>',
        merged: '<span class="status-badge status-merged">Merged</span>',
      };

      const reviewDotClass = {
        PENDING: 'review-dot-pending',
        APPROVED: 'review-dot-approved',
        CHANGES_REQUESTED: 'review-dot-changes',
        COMMENTED: 'review-dot-commented',
        DISMISSED: 'review-dot-pending',
      };

      const reviewStateLabel = {
        PENDING: 'Pending',
        APPROVED: 'Approved',
        CHANGES_REQUESTED: 'Changes requested',
        COMMENTED: 'Commented',
        DISMISSED: 'Dismissed',
      };

      document.getElementById('pr-list').innerHTML = `
        <table class="pr-table">
          <thead>
            <tr>
              <th>PR</th>
              <th>Status</th>
              <th>Author</th>
              <th>Reviewers</th>
              <th>Repo</th>
              <th class="hide-mobile">Updated</th>
            </tr>
          </thead>
          <tbody>
            ${prs.map(pr => `
              <tr>
                <td class="pr-title-cell">
                  <a href="${pr.url}" target="_blank" rel="noopener" class="pr-title-link">
                    ${escapeHtml(pr.title)} <span class="pr-number">#${pr.number}</span>
                  </a>
                  ${pr.labels.length ? `<div style="margin-top:4px">${pr.labels.map(l => `<span style="background:#${l.color};color:${getContrastColor(l.color)};padding:1px 6px;border-radius:10px;font-size:11px;margin-right:4px;">${escapeHtml(l.name)}</span>`).join('')}</div>` : ''}
                </td>
                <td>${statusLabels[pr.status]}</td>
                <td>
                  <div class="author-cell">
                    <img src="${pr.author.avatar_url}&s=48" alt="${pr.author.login}">
                    ${pr.author.login}
                  </div>
                </td>
                <td>
                  <div class="reviewer-avatars">
                    ${pr.reviewers.length === 0 ? '<span style="color:var(--text-muted);font-size:13px;">None</span>' :
                      pr.reviewers.map(r => `
                        <div class="reviewer-avatar tooltip" data-tooltip="${r.user.login}: ${reviewStateLabel[r.state] || r.state}">
                          <img src="${r.user.avatar_url}&s=48" alt="${r.user.login}">
                          <div class="review-state-dot ${reviewDotClass[r.state] || 'review-dot-pending'}"></div>
                        </div>
                      `).join('')
                    }
                  </div>
                </td>
                <td><span class="pr-repo">${pr.repoShort}</span></td>
                <td class="hide-mobile"><span class="time-ago">${timeAgo(pr.updated_at)}</span></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function getContrastColor(hex) {
      const r = parseInt(hex.substr(0, 2), 16);
      const g = parseInt(hex.substr(2, 2), 16);
      const b = parseInt(hex.substr(4, 2), 16);
      return (r * 299 + g * 587 + b * 114) / 1000 > 128 ? '#000' : '#fff';
    }

    function timeAgo(dateStr) {
      const seconds = Math.floor((Date.now() - new Date(dateStr)) / 1000);
      if (seconds < 60) return 'just now';
      const minutes = Math.floor(seconds / 60);
      if (minutes < 60) return `${minutes}m ago`;
      const hours = Math.floor(minutes / 60);
      if (hours < 24) return `${hours}h ago`;
      const days = Math.floor(hours / 24);
      if (days < 30) return `${days}d ago`;
      return new Date(dateStr).toLocaleDateString();
    }

    ['search-input', 'status-filter', 'repo-filter', 'sort-select'].forEach(id => {
      document.getElementById(id).addEventListener('input', renderTable);
      document.getElementById(id).addEventListener('change', renderTable);
    });

    // Init
    const config = getConfig();
    if (config) {
      populateRepoFilter(config.repos);
      const cache = JSON.parse(localStorage.getItem(CACHE_KEY) || 'null');
      if (cache && Date.now() - cache.time < 5 * 60 * 1000) {
        allPRs = cache.data;
        document.getElementById('last-updated').textContent = 'Updated ' + timeAgo(new Date(cache.time).toISOString());
        renderAll();
      } else {
        fetchAllPRs();
      }
    } else {
      showSetup(false);
    }
  </script>
</body>
</html>
