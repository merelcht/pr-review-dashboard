<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kedro Community Dashboard</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface-hover: #1c2129;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --green: #3fb950;
      --yellow: #d29922;
      --red: #f85149;
      --purple: #bc8cff;
      --orange: #db6d28;
      --pink: #f778ba;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    header h1 {
      font-size: 20px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .header-actions a {
      color: var(--accent);
      text-decoration: none;
      font-size: 14px;
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
    }

    .header-actions a:hover { background: var(--surface-hover); }
    .header-actions a.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    .time-ago { color: var(--text-muted); font-size: 13px; }

    .main-content { padding: 24px; max-width: 1200px; margin: 0 auto; }

    .dashboard-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .card-title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
    }

    .card-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-icon svg { fill: currentColor; }

    /* Wizard card */
    .wizard-card { grid-column: 1 / -1; }

    .wizard-profile {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .wizard-hat {
      width: 40px;
      height: 40px;
      object-fit: contain;
    }

    .wizard-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 3px solid var(--purple);
      box-shadow: 0 0 20px rgba(188,140,255,0.2);
    }

    .wizard-info h2 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .wizard-info .wizard-role {
      color: var(--purple);
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .wizard-info .wizard-dates {
      color: var(--text-muted);
      font-size: 13px;
    }

    .wizard-next {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      font-size: 13px;
      color: var(--text-muted);
    }

    .wizard-next strong { color: var(--text); }

    /* Metric cards */
    .metric-card {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 160px;
    }

    .metric-number {
      font-size: 48px;
      font-weight: 800;
      line-height: 1;
      margin: 12px 0;
    }

    .metric-label {
      font-size: 14px;
      color: var(--text-muted);
    }

    .metric-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: var(--accent);
      text-decoration: none;
      font-size: 13px;
      margin-top: 8px;
    }

    .metric-link:hover { text-decoration: underline; }

    /* Celebrations card */
    .celebrations-card { grid-column: 1 / -1; }

    .celebration-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .celebration-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: var(--bg);
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    .celebration-item.is-today {
      border-color: var(--yellow);
      background: rgba(210,153,34,0.08);
    }

    .celebration-emoji {
      font-size: 24px;
      width: 40px;
      text-align: center;
      flex-shrink: 0;
    }

    .celebration-text {
      flex: 1;
    }

    .celebration-text .cel-title {
      font-weight: 600;
      font-size: 14px;
    }

    .celebration-text .cel-date {
      color: var(--text-muted);
      font-size: 12px;
      margin-top: 2px;
    }

    .celebration-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 10px;
      white-space: nowrap;
    }

    .badge-today { background: rgba(210,153,34,0.2); color: var(--yellow); }
    .badge-upcoming { background: rgba(88,166,255,0.15); color: var(--accent); }
    .badge-past { background: rgba(139,148,158,0.15); color: var(--text-muted); }

    .no-celebrations {
      color: var(--text-muted);
      font-size: 14px;
      text-align: center;
      padding: 20px;
    }

    /* Nightly builds card */
    .nightly-card { grid-column: 1 / -1; }

    .nightly-repos {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    .nightly-repo {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .nightly-repo-name {
      font-size: 13px;
      font-weight: 600;
    }

    .nightly-count {
      font-size: 18px;
      font-weight: 800;
    }

    .nightly-count.has-issues { color: var(--red); }
    .nightly-count.all-clear { color: var(--green); }

    .nightly-issue-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .nightly-issue {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
    }

    .nightly-issue a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      flex: 1;
    }

    .nightly-issue a:hover { text-decoration: underline; }

    .nightly-issue .nightly-repo-tag {
      font-size: 11px;
      color: var(--text-muted);
      background: var(--surface);
      padding: 1px 6px;
      border-radius: 4px;
      white-space: nowrap;
    }

    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      grid-column: 1 / -1;
    }

    .loading-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 768px) {
      .dashboard-grid { grid-template-columns: 1fr; }
      .wizard-card, .celebrations-card, .nightly-card { grid-column: 1; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Kedro Community Dashboard</h1>
    <div class="header-actions">
      <span id="last-updated" class="time-ago"></span>
      <a href="index.html" class="active">Home</a>
      <a href="reviews.html">PR Reviews</a>
      <a href="rota.html">Wizard Rota</a>
    </div>
  </header>

  <div class="main-content">
    <div class="dashboard-grid" id="dashboard">
      <div class="loading"><div class="loading-spinner"></div>Loading dashboard...</div>
    </div>
  </div>

  <script>
    const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    async function loadAll() {
      try {
        const [dataRes, wizardRes, celebRes, teamRes] = await Promise.all([
          fetch('data.json'),
          fetch('wizard.json'),
          fetch('celebrations.json'),
          fetch('team.json'),
        ]);

        const data = dataRes.ok ? await dataRes.json() : { prs: [], wizard_issues: [] };
        const wizard = wizardRes.ok ? await wizardRes.json() : { rotation: [] };
        const celebrations = celebRes.ok ? await celebRes.json() : { birthdays: [], milestones: [] };
        const teamList = teamRes.ok ? await teamRes.json() : [];
        const teamSet = new Set(teamList.map(t => (t.github || t).toLowerCase()));

        if (data.updated_at) {
          document.getElementById('last-updated').textContent = 'Updated ' + timeAgo(data.updated_at);
        }

        const openPRs = data.prs.filter(pr => pr.status !== 'merged');
        const communityPRs = openPRs.filter(pr => !teamSet.has(pr.author.login.toLowerCase()));
        const wizardIssues = data.wizard_issues || [];
        const nightlyIssues = data.nightly_issues || [];

        renderDashboard(wizard, communityPRs, wizardIssues, celebrations, nightlyIssues);
      } catch (err) {
        const errDiv = document.createElement('div');
        errDiv.className = 'loading';
        errDiv.textContent = `Error loading dashboard: ${err.message}`;
        document.getElementById('dashboard').innerHTML = '';
        document.getElementById('dashboard').appendChild(errDiv);
      }
    }

    function getCurrentWizard(rotation) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      return rotation.find(w => {
        const start = new Date(w.start + 'T00:00:00');
        const end = new Date(w.end + 'T23:59:59');
        return today >= start && today <= end;
      });
    }

    function getNextWizard(rotation) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const future = rotation
        .filter(w => new Date(w.start + 'T00:00:00') > today)
        .sort((a, b) => new Date(a.start) - new Date(b.start));
      return future[0] || null;
    }

    function formatDateRange(start, end) {
      const s = new Date(start + 'T00:00:00');
      const e = new Date(end + 'T00:00:00');
      return `${MONTHS[s.getMonth()]} ${s.getDate()} - ${MONTHS[e.getMonth()]} ${e.getDate()}, ${e.getFullYear()}`;
    }

    function getUpcomingCelebrations(celebrations) {
      const today = new Date();
      const currentMonth = today.getMonth() + 1;
      const currentDay = today.getDate();
      const currentYear = today.getFullYear();

      const events = [];

      for (const b of celebrations.birthdays) {
        const isToday = b.month === currentMonth && b.day === currentDay;
        const eventDate = new Date(currentYear, b.month - 1, b.day);
        if (eventDate < today && !isToday) eventDate.setFullYear(currentYear + 1);
        const daysUntil = Math.ceil((eventDate - today) / 86400000);

        events.push({
          emoji: isToday ? String.fromCodePoint(0x1F389) : String.fromCodePoint(0x1F382),
          title: `${escapeHtml(b.name)}'s Birthday`,
          date: `${MONTHS[b.month - 1]} ${b.day}`,
          isToday,
          daysUntil: isToday ? 0 : daysUntil,
          type: 'birthday',
        });
      }

      for (const m of celebrations.milestones) {
        const isToday = m.month === currentMonth && m.day === currentDay;
        const yearsAgo = currentYear - m.year;
        const eventDate = new Date(currentYear, m.month - 1, m.day);
        if (eventDate < today && !isToday) eventDate.setFullYear(currentYear + 1);
        const daysUntil = Math.ceil((eventDate - today) / 86400000);

        events.push({
          emoji: isToday ? String.fromCodePoint(0x1F389) : String.fromCodePoint(0x1F31F),
          title: m.title,
          date: `${MONTHS[m.month - 1]} ${m.day}, ${m.year}` + (yearsAgo > 0 ? ` (${yearsAgo} years ago)` : ''),
          isToday,
          daysUntil: isToday ? 0 : daysUntil,
          type: 'milestone',
        });
      }

      events.sort((a, b) => a.daysUntil - b.daysUntil);
      return events.filter(e => e.daysUntil <= 5);
    }

    function renderDashboard(wizard, communityPRs, wizardIssues, celebrations, nightlyIssues) {
      const current = getCurrentWizard(wizard.rotation);
      const next = getNextWizard(wizard.rotation);
      const events = getUpcomingCelebrations(celebrations);

      const needsReview = communityPRs.filter(pr => pr.status === 'needs_review').length;

      document.getElementById('dashboard').innerHTML = `
        <div class="card wizard-card">
          <div class="card-header">
            <span class="card-title">Community Wizard This Week</span>
            <img class="wizard-hat" src="wizard-hat.png" alt="Wizard hat">
          </div>
          ${current ? `
            <div class="wizard-profile">
              <img class="wizard-avatar" src="https://github.com/${encodeURIComponent(current.github)}.png?size=160" alt="${escapeHtml(current.name)}">
              <div class="wizard-info">
                <div class="wizard-role">Community Wizard</div>
                <h2>${escapeHtml(current.name)}</h2>
                <div class="wizard-dates">${formatDateRange(current.start, current.end)}</div>
              </div>
            </div>
            ${next ? `<div class="wizard-next">Up next: <strong>${escapeHtml(next.name)}</strong> (${formatDateRange(next.start, next.end)})</div>` : ''}
          ` : `
            <div style="color:var(--text-muted);font-size:14px;">No wizard scheduled for this week. Update <code>wizard.json</code> to set the rotation.</div>
          `}
        </div>

        <div class="card metric-card">
          <div class="card-header">
            <span class="card-title">Community PRs</span>
            <div class="card-icon" style="background:rgba(88,166,255,0.15);color:var(--accent);">
              <svg width="18" height="18" viewBox="0 0 16 16"><path d="M7.177 3.073L9.573.677A.25.25 0 0110 .854v4.792a.25.25 0 01-.427.177L7.177 3.427a.25.25 0 010-.354zM3.75 2.5a.75.75 0 100 1.5.75.75 0 000-1.5zm-2.25.75a2.25 2.25 0 113 2.122v5.256a2.251 2.251 0 11-1.5 0V5.372A2.25 2.25 0 011.5 3.25zM11 2.5h-1V4h1a1 1 0 011 1v5.628a2.251 2.251 0 101.5 0V5A2.5 2.5 0 0011 2.5zm1 10.25a.75.75 0 111.5 0 .75.75 0 01-1.5 0zM3.75 12a.75.75 0 100 1.5.75.75 0 000-1.5z"/></svg>
            </div>
          </div>
          <div class="metric-number" style="color:var(--accent)">${communityPRs.length}</div>
          <div>
            <div class="metric-label">${needsReview} awaiting first review</div>
            <a href="reviews.html" class="metric-link">View PR board &rarr;</a>
          </div>
        </div>

        <div class="card metric-card">
          <div class="card-header">
            <span class="card-title">Wizard Board Issues</span>
            <div class="card-icon" style="background:rgba(63,185,80,0.15);color:var(--green);">
              <svg width="18" height="18" viewBox="0 0 16 16"><path d="M8 9.5a1.5 1.5 0 100-3 1.5 1.5 0 000 3z"/><path d="M8 0a8 8 0 100 16A8 8 0 008 0zM1.5 8a6.5 6.5 0 1113 0 6.5 6.5 0 01-13 0z"/></svg>
            </div>
          </div>
          <div class="metric-number" style="color:var(--green)">${wizardIssues.length}</div>
          <div>
            <div class="metric-label">Open issues to triage</div>
            <a href="https://github.com/orgs/kedro-org/projects/10" target="_blank" rel="noopener" class="metric-link">Open project board &rarr;</a>
          </div>
        </div>

        <div class="card nightly-card">
          <div class="card-header">
            <span class="card-title">Nightly Builds</span>
            <div class="card-icon" style="background:${nightlyIssues.length > 0 ? 'rgba(248,81,73,0.15)' : 'rgba(63,185,80,0.15)'};color:${nightlyIssues.length > 0 ? 'var(--red)' : 'var(--green)'};">
              <svg width="18" height="18" viewBox="0 0 16 16"><path d="M8.515 1.019A7 7 0 0 0 8 1V0a8 8 0 0 1 .589.022l-.074.997zm2.004.45a7.003 7.003 0 0 0-.985-.299l.219-.976c.383.086.76.2 1.126.342l-.36.933zm1.37.71a7.01 7.01 0 0 0-.439-.27l.493-.87a8.025 8.025 0 0 1 .979.654l-.615.789a7.003 7.003 0 0 0-.418-.302zm1.834 1.79a6.99 6.99 0 0 0-.653-.796l.724-.69c.27.285.52.59.747.91l-.818.576zm.744 1.352a7.08 7.08 0 0 0-.214-.468l.893-.45a7.976 7.976 0 0 1 .45 1.088l-.95.313a7.023 7.023 0 0 0-.179-.483zm.53 2.507a6.991 6.991 0 0 0-.1-1.025l.985-.17c.067.386.106.778.116 1.17l-1 .025zm-.131 1.538c.033-.17.06-.339.081-.51l.993.123a7.957 7.957 0 0 1-.23 1.155l-.964-.267c.046-.166.086-.333.12-.501zm-.952 2.379c.184-.29.346-.594.486-.908l.914.405c-.16.36-.345.706-.555 1.038l-.845-.535zm-.964 1.205c.122-.122.239-.248.35-.378l.758.653a8.073 8.073 0 0 1-.401.432l-.707-.707z"/><path d="M8 1a7 7 0 1 0 4.95 11.95l.707.707A8.001 8.001 0 1 1 8 0v1z"/><path d="M7.5 3a.5.5 0 0 1 .5.5v5.21l3.248 1.856a.5.5 0 0 1-.496.868l-3.5-2A.5.5 0 0 1 7 9V3.5a.5.5 0 0 1 .5-.5z"/></svg>
            </div>
          </div>
          ${nightlyIssues.length === 0 ? `
            <div style="display:flex;align-items:center;gap:10px;">
              <span style="font-size:32px;">${String.fromCodePoint(0x1F389)}</span>
              <div>
                <div style="color:var(--green);font-size:16px;font-weight:700;margin-bottom:4px;">All clear</div>
                <div class="metric-label">No open nightly build issues</div>
              </div>
            </div>
          ` : `
            <div style="color:var(--red);font-size:16px;font-weight:700;margin-bottom:12px;">${nightlyIssues.length} open nightly build issue${nightlyIssues.length !== 1 ? 's' : ''}</div>
            <div class="nightly-issue-list">
              ${nightlyIssues.map(issue => `
                <div class="nightly-issue">
                  <a href="${escapeHtml(issue.url)}" target="_blank" rel="noopener">
                    ${escapeHtml(issue.title)} <span style="color:var(--text-muted);font-weight:400;">#${issue.number}</span>
                  </a>
                  <span class="nightly-repo-tag">${escapeHtml(issue.repoShort)}</span>
                </div>
              `).join('')}
            </div>
          `}
        </div>

        ${events.length === 0 ? '' : `
        <div class="card celebrations-card">
          <div class="card-header">
            <span class="card-title">Celebrations & Milestones</span>
            <div class="card-icon" style="background:rgba(247,120,186,0.15);color:var(--pink);">
              <svg width="18" height="18" viewBox="0 0 16 16"><path d="M8 16A8 8 0 108 0a8 8 0 000 16zm.93-9.412l-1 4.705c-.07.34.029.533.304.533.194 0 .487-.07.686-.246l-.088.416c-.287.346-.92.598-1.465.598-.703 0-1.002-.422-.808-1.319l.738-3.468c.064-.293.006-.399-.287-.399l-.348-.003.066-.312 1.752-.217.313-.016zm.1-2.988a.7.7 0 110 1.401.7.7 0 010-1.401z"/></svg>
            </div>
          </div>
          <div class="celebration-list">
            ${events.map(e => `
              <div class="celebration-item ${e.isToday ? 'is-today' : ''}">
                <div class="celebration-emoji">${e.emoji}</div>
                <div class="celebration-text">
                  <div class="cel-title">${e.title}</div>
                  <div class="cel-date">${e.date}</div>
                </div>
                <span class="celebration-badge ${e.isToday ? 'badge-today' : 'badge-upcoming'}">
                  ${e.isToday ? 'Today!' : `in ${e.daysUntil} days`}
                </span>
              </div>
            `).join('')}
          </div>
        </div>
        `}
      `;
    }

    function timeAgo(dateStr) {
      const seconds = Math.floor((Date.now() - new Date(dateStr)) / 1000);
      if (seconds < 60) return 'just now';
      const minutes = Math.floor(seconds / 60);
      if (minutes < 60) return `${minutes}m ago`;
      const hours = Math.floor(minutes / 60);
      if (hours < 24) return `${hours}h ago`;
      const days = Math.floor(hours / 24);
      if (days < 30) return `${days}d ago`;
      return new Date(dateStr).toLocaleDateString();
    }

    loadAll();
  </script>
</body>
</html>
